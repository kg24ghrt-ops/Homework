name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code using v4
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (Required for modern Android/Compose projects)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: Grant execute permission for gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Build the Debug APK
      # This ensures all ink/stylus code removal didn't break the build
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # Step 5: Upload the APK as an artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cahier-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk