name: Build and Package Acode Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write  # Fixes the 403 error automatically

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Plugin (Root Level Only)
        run: |
          mkdir dist
          # The -j flag "junks" the directory paths
          # We explicitly list only the required files
          zip -j dist/super-editor-plugin.zip \
            main.js \
            plugin.json \
            styles.css \
            icon.png \
            readme.md
          
          echo "ZIP Content Check:"
          unzip -l dist/super-editor-plugin.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/super-editor-plugin.zip
          body: "Stable release of the Super Editor Plugin. Install by downloading the ZIP and selecting 'Local' in Acode."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}